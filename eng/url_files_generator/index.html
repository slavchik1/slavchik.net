<!DOCTYPE html>
<html lang="en">
    <head>
        <title>URL files generator</title>
        <meta charset="utf-8">
        <link rel="shortcut icon" href="../../resources/logo/logo.png" type="image/x-icon">
        <link rel="icon" href="../../resources/logo/logo.png" type="image/x-icon">
        <link rel="stylesheet" type="text/css" href="../../resources/css/styles11.css">
    </head>
    <body>
        <center>
            <h1>URL files generator</h1>
        </center>
        <hr>
        <img src="../../resources/images/blank.png" width="0" height="10px">
        <center>
            <div class="main-div">
                <hr color="white">
                <img src="../../resources/images/blank.png" width="0" height="10px">
                <center>
                    <div class="upper-div">
                        <select id="select-format">
                            <option id="undefined">Select the format</option>
                            <option id="url">URL (Windows)</option>
                            <option id="webloc">WEBLOC (MacOS)</option>
                            <option id="html">HTML (universal)</option>
                        </select>
                        <input id="link" placeholder="Enter an URL">
                    </div>
                    <div class="lover-div">
                        <button id="generate">generate</button>
                        <span id="status" class="invisible"></span>
                        <img src="../../resources/images/blank.png" width="50px" height="0">
                        <button id="download-button" class="invisible">Download</button>
                    </div>
                </center>
                <img src="../../resources/images/blank.png" width="0" height="10px">
                <hr color="white">
            </div>
        </center>
        <script src="../../resources/js/url_files_generator.js"></script>
    </body>
</html>
